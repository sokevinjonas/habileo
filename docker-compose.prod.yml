services:
  backend:
    image: sokevinjonas/habileo-backend:latest
    container_name: habileo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - habileo

networks:
  habileo:
    driver: bridge
